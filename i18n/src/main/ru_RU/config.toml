[kbfc.config.gui]
title = "Настройки Freecam"

  [kbfc.config.gui.fallback]
  title = "GUI конфигурации недоступен."

[kbfc.config.controls]
label = "Настройка клавиш"
tooltip = "Настройка клавиши для Freecam."

[kbfc.config.movement]
label = "Настройки движения"
tooltip = "Как двигается камера."

  [kbfc.config.movement.flightMode]
  label = "Режим полёта"
  tooltip = "Тип полёта, используемый Freecam."
  DEFAULT = "По умолчанию"
  CREATIVE = "Творческий режим"

  [kbfc.config.movement.speed]
  value = "Значение: %01.2f"

    [kbfc.config.movement.speed.horizontal]
    label = "Горизонтальная скорость"
    tooltip = "Горизонтальная скорость свободной камеры."

    [kbfc.config.movement.speed.vertical]
    label = "Вертикальная скорость"
    tooltip = "Вертикальная скорость свободной камеры."

[kbfc.config.collision]
label = "Настройки коллизии"
tooltip = "Сквозь какие блоки вы можете проходить в режиме свободной камеры."

  [kbfc.config.collision.ignoreAll]
  label = "Игнорировать всю коллизию"
  "tooltip[0]" = "Позволяет перемещаться сквозь все блоки в режиме свободной камеры."
  "tooltip[1]" = "§eПереопределяет вышеуказанные настройки."

  [kbfc.config.collision.ignoreTransparent]
  label = "Игнорировать прозрачные блоки"
  tooltip = "Позволяет перемещаться сквозь прозрачные блоки в свободной камере."

  [kbfc.config.collision.ignoreOpenable]
  label = "Игнорировать открываемые блоки"
  tooltip = "Позволяет перемещаться через двери/люки/калитки в режиме свободной камеры."

  [kbfc.config.collision.ignoreCustom]
  label = "Пользовательский список исключений"
  tooltip = "Позволяет перемещаться сквозь некоторые блоки в режиме свободной камеры."

[kbfc.config.collision.whitelist.ids]
label = "Игнорировать идентификаторы"
"tooltip[0]" = 'Используйте идентификатор блока, например "grass_block".'
"tooltip[1]" = 'Если пространство имён опущено, предполагается "minecraft:".'

[kbfc.config.collision.whitelist.patterns]
label = "Игнорировать регулярные выражения"
"tooltip[0]" = "Использовать синтаксис регулярных выражений."
"tooltip[1]" = 'Соответствует полному идентификатору блока, например "minecraft:grass_block".'

  [kbfc.config.collision.alwaysCheck]
  label = "Всегда проверять изначальную коллизию"
  "tooltip[0]" = "Следует ли в §7Первоначальной перспективе§r проверять наличие"
  "tooltip[1]" = "столкновения, даже при использовании §7Игнорировать все столкновения§r."

[kbfc.config.visual]
label = "Параметры отображения"
tooltip = "Внешний вид свободной камеры."

  [kbfc.config.visual.perspective]
  label = "Первоначальная перспектива"
  tooltip = "Первоначальная перспектива камеры."
  FIRST_PERSON = "От первого лица"
  THIRD_PERSON = "От третьего лица"
  THIRD_PERSON_MIRROR = "Зеркально"
  INSIDE = "Внутри"

  [kbfc.config.visual.showPlayer]
  label = "Показывать игрока"
  tooltip = "Показывает вашего игрока в исходном положении."

  [kbfc.config.visual.showHand]
  label = "Показывать руку"
  tooltip = "Можете ли вы видеть свою руку в режиме свободной камеры."

  [kbfc.config.visual.fullBright]
  label = "Полная яркость"
  tooltip = "Увеличивает яркость в режиме свободной камеры."

  [kbfc.config.visual.showSubmersionFog]
  label = "Показать погружной туман"
  tooltip = "Можете ли вы видеть слой тумана под водой, в лаве или в рыхлом снегу."

  [kbfc.config.visual.outlinePlayer]
  label = "Игрок в обводке"
  "tooltip[0]" = "Применить контур к вашему игроку при активации Freecam."
  "tooltip[1]" = 'Контур также можно регулировать с помощью комбинации клавиш "Переключить Player Outline".'

[kbfc.config.utility]
label = "Настройки утилиты"
tooltip = "Улучшения свободной камеры."

  [kbfc.config.utility.disableOnDamage]
  label = "Отключать при получении урона"
  tooltip = "Отключает свободную камеру при получении урона."

  [kbfc.config.utility.freezePlayer]
  label = "Заморозить игрока"
  "tooltip[0]" = "Предотвращает перемещение игрока при активной свободной камере."
  "tooltip[1]" = "§cВНИМАНИЕ: Многопользовательское использование не рекомендуется."

[kbfc.config.utility.interact.allow]
label = "Разрешить взаимодействие"
"tooltip[0]" = "Можете ли вы взаимодействовать с блоками/сущностями в режиме свободной камеры."
"tooltip[1]" = "§cВНИМАНИЕ: Многопользовательское использование не рекомендуется."

[kbfc.config.utility.interact.mode]
label = "Режим взаимодействия"
tooltip = "Источник взаимодействия с блоком/сущностью."
CAMERA = "Камера"
PLAYER = "Игрок"

[kbfc.config.servers]
label = "Настройки сетевой игры"
tooltip = "Настройки для сетевых серверов."

  [kbfc.config.servers.mode]
  label = "Режим ограничения"
  "tooltip[0]" = "Разрешить или запретить использование свободной камеры на определённых серверах."
  "tooltip[1]" = "(используя белый или черный список)."
  NONE = "Без ограничений"
  WHITELIST = "Белый список"
  BLACKLIST = "Чёрный список"

  [kbfc.config.servers.whitelist]
  label = "Белый список:"

  [kbfc.config.servers.blacklist]
  label = "Чёрный список:"

[kbfc.config.notification]
label = "Настройки уведомлений"
tooltip = "Показать или скрыть уведомления."

  [kbfc.config.notification.freecam]
  label = "Уведомления свободной камеры"
  tooltip = "Уведомляет вас о входе/выходе из режима свободной камеры."

  [kbfc.config.notification.tripod]
  label = "Уведомления штатива"
  tooltip = "Уведомляет вас при входе/выходе в режим камеры со штативом."
