  tooltip = "اینکه شما یک پوششی از مه در زیر آب، گدازه یا برف پودر شده ببینید."

  [kbfc.config.visual.outlinePlayer]
  label = "پخش کننده طرح کلی"
  "tooltip[0]" = "هنگام فعال کردن فری کم، یک طرح کلی به پخش‌کننده خود اعمال کنید."
  "tooltip[1]" = 'همچنین می‌توان طرح کلی را با استفاده از کلید ترکیبی "Toggle Player Outline" کنترل کرد.'

[kbfc.config.utility]
label = "تنظیمات کاربردی"
tooltip = "بهبود های فری کم."

