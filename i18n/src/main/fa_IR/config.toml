  label = "دید اولیه"
  tooltip = "دید اولیه دوربین."
  FIRST_PERSON = "اول شخص"
  THIRD_PERSON = "سوم شخص"
  THIRD_PERSON_MIRROR = "معکوس کردن"
  INSIDE = "داخل"

  [kbfc.config.visual.showPlayer]
  label = "نمایش بازیکن"
  tooltip = "بازیکن را در موقعیت اصلی نشان می دهد."

  [kbfc.config.visual.showHand]
  label = "نمایش دست"
  tooltip = "اینکه دست خود را در فری کم ببینید."

  [kbfc.config.visual.fullBright]
  label = "روشنایی کامل"
  tooltip = "روشنایی را حین بودن در فری کم افزایش می دهد."

  [kbfc.config.visual.showSubmersionFog]
