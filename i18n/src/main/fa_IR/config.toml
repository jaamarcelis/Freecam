  tooltip = "وقتی آسیب میبینید فری کم غیرفعال می شود."

  [kbfc.config.utility.freezePlayer]
  label = "تثبیت بازیکن"
  "tooltip[0]" = "وقتی فری کم فعال است از حرکت بازیکن جلوگیری میکند."
  "tooltip[1]" = "§cاخطار: استفاده در چند نفره توصیه نمی شود."

[kbfc.config.utility.interact.allow]
label = "اجازه دادن به تعامل"
