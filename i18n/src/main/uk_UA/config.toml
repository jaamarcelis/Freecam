[kbfc.config.gui]
title = "Параметри Freecam"

  [kbfc.config.gui.fallback]
  title = "Налаштування графічного інтерфейсу недоступне."

[kbfc.config.controls]
label = "Призначення клавіш"
tooltip = "Призначення клавіш Freecam."

[kbfc.config.movement]
label = "Параметри руху"
tooltip = "Як рухається камера."

  [kbfc.config.movement.flightMode]
  label = "Режим польоту"
  tooltip = "Тип польоту, який використовує вільна камера."
  DEFAULT = "За замовчуванням"
  CREATIVE = "Творчий"

  [kbfc.config.movement.speed]
  value = "Значення: %01.2f"

    [kbfc.config.movement.speed.horizontal]
    label = "Горизонтальна швидкість"
    tooltip = "Горизонтальна швидкість вільної камери."

    [kbfc.config.movement.speed.vertical]
    label = "Вертикальна швидкість"
    tooltip = "Вертикальна швидкість вільної камери."

[kbfc.config.collision]
label = "Параметри зіткнення"
tooltip = "Крізь які блоки ви можете пересуватися в режимі вільної камери."

  [kbfc.config.collision.ignoreAll]
  label = "Ігнорувати всі зіткнення"
  "tooltip[0]" = "Дозволяє пересуватися крізь усі блоки в режимі вільної камери."
  "tooltip[1]" = "§eПеревизначає вищевказані налаштування."

  [kbfc.config.collision.ignoreTransparent]
  label = "Ігнорувати прозорі блоки"
  tooltip = "Дозволяє пересуватися крізь прозорі блоки в режимі вільної камери."

  [kbfc.config.collision.ignoreOpenable]
  label = "Ігнорувати блоки, що відкриваються"
  tooltip = "Дозволяє пересуватися крізь двері, люки та хвіртки в режимі вільної камери"

  [kbfc.config.collision.ignoreCustom]
  label = "Користувацький список винятків"
  tooltip = "Дозволяє пересуватися крізь певні блоки в режимі вільної камери."

[kbfc.config.collision.whitelist.ids]
label = "Ігнорувати ідентифікатори"
"tooltip[0]" = 'Використовуйте ідентифікатор блоку, наприклад, "grass_block".'
"tooltip[1]" = 'Якщо простір імен опущений, передбачено "minecraft:".'

[kbfc.config.collision.whitelist.patterns]
label = "Ігнорувати регулярні вирази"
"tooltip[0]" = "Використовуйте синтаксис регулярних виразів."
"tooltip[1]" = 'Відповідає повному ідентифікатору блоку, наприклад "minecraft:grass_block".'

  [kbfc.config.collision.alwaysCheck]
  label = "Завжди перевіряти початкову колізію"
  "tooltip[0]" = "Чи потрібно в §7Початковій перспективі§r перевіряти на наявність"
  "tooltip[1]" = "колізії, навіть при використанні §7Ігнорувати всю колізію§r."

[kbfc.config.visual]
label = "Параметри вигляду"
tooltip = "Вигляд freecam."

  [kbfc.config.visual.perspective]
  label = "Початкова перспектива"
  tooltip = "Початкова перспектива камери."
  FIRST_PERSON = "Від першої особи"
  THIRD_PERSON = "Від третьої особи"
  THIRD_PERSON_MIRROR = "Дзеркально"
  INSIDE = "Всередині"

  [kbfc.config.visual.showPlayer]
  label = "Показувати гравця"
  tooltip = "Показує вашого гравця в початковій позиції."

  [kbfc.config.visual.showHand]
  label = "Показувати руку"
  tooltip = "Чи видно вашу руку в режимі вільної камери."

  [kbfc.config.visual.fullBright]
  label = "Максимальна яскравість"
  tooltip = "Збільшує яскравість в режимі вільної камери."

  [kbfc.config.visual.showSubmersionFog]
  label = "Показувати ефект занурення"
  tooltip = "Чи будете ви бачити туман під водою, у лаві або в сипкому снігу."

  [kbfc.config.visual.outlinePlayer]
  label = "Автоматичний окреслювач гравця"
  "tooltip[0]" = "Застосовує контур до вашого гравця під час активації вільної камери."
  "tooltip[1]" = 'Контуром також можна керувати за допомогою прив’язки клавіш "Перемикач контур гравця".'

[kbfc.config.utility]
label = "Параметри корисности"
tooltip = "Покращення Freecam."

  [kbfc.config.utility.disableOnDamage]
  label = "Вимкнути при отриманні шкоди"
  tooltip = "Вимикає вільну камеру, коли отримано шкоду."

  [kbfc.config.utility.freezePlayer]
  label = "Заморозити гравця"
  "tooltip[0]" = "Запобігає переміщенню гравця під час активної вільної камери."
  "tooltip[1]" = "§ПОПЕРЕДЖЕННЯ: Не рекомендується використовувати в багатокористувацькій грі."

[kbfc.config.utility.interact.allow]
label = "Дозволити взаємодію"
"tooltip[0]" = "Чи можна взаємодіяти з блоками / сутностями в режимі вільної камери."
"tooltip[1]" = "§ПОПЕРЕДЖЕННЯ: Не рекомендується використовувати в багатокористувацькій грі."

[kbfc.config.utility.interact.mode]
label = "Режим взаємодії"
tooltip = "Джерело взаємодії між блоком/сутністю."
CAMERA = "Камера"
PLAYER = "Гравець"

[kbfc.config.servers]
label = "Параметри багатокористувацької гри"
tooltip = "Параметри для багатокористувацьких серверів."

  [kbfc.config.servers.mode]
  label = "Режим обмеження"
  "tooltip[0]" = "Дозволити або заборонити використання вільної камери на певних серверах."
  "tooltip[1]" = "(використовуючи білий або чорний список)."
  NONE = "Без обмежень"
  WHITELIST = "Білий список"
  BLACKLIST = "Чорний список"

  [kbfc.config.servers.whitelist]
  label = "Білий список:"

  [kbfc.config.servers.blacklist]
  label = "Чорний список:"

[kbfc.config.notification]
label = "Параметри сповіщень"
tooltip = "Показати або приховати сповіщення."

  [kbfc.config.notification.freecam]
  label = "Сповіщення Freecam"
  tooltip = "Сповіщає вас, коли ви входите/виходите з режиму вільної камери."

  [kbfc.config.notification.tripod]
  label = "Сповіщення штатива"
  tooltip = "Сповіщає вас, коли ви входите/виходите в режим камери зі штативом."
