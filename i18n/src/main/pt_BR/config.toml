[kbfc.config.gui]
title = "Opções do Freecam"

  [kbfc.config.gui.fallback]
  title = "O GUI de opções não está disponível."

[kbfc.config.controls]
label = "Atalhos"
tooltip = "Atalhos do Freecam."

[kbfc.config.movement]
label = "Opções de Movimento"
tooltip = "Como a câmera se move."

  [kbfc.config.movement.flightMode]
  label = "Modo de Voo"
  tooltip = "O modo de voo usado pelo freecam."
  DEFAULT = "Padrão"
  CREATIVE = "Criativo"

  [kbfc.config.movement.speed]
  value = "Valor: %01.2f"

    [kbfc.config.movement.speed.horizontal]
    label = "Velocidade Horizontal"
    tooltip = "A velocidade horizontal do freecam."

    [kbfc.config.movement.speed.vertical]
    label = "Velocidade Vertical"
    tooltip = "A velocidade vertical do freecam."

[kbfc.config.collision]
label = "Colisões"
tooltip = "Quais blocos é possível atravessar no freecam."

  [kbfc.config.collision.ignoreAll]
  label = "Ignorar Colisões"
  "tooltip[0]" = "Permite atravessar todos os blocos no freecam."
  "tooltip[1]" = "§eSubstitui as opções acima."

  [kbfc.config.collision.ignoreTransparent]
  label = "Ignorar Blocos Invisíveis"
  tooltip = "Permite atravessar blocos invisíveis no freecam."

  [kbfc.config.collision.ignoreOpenable]
  label = "Ignorar Blocos Interativos"
  tooltip = "Permite atravessar portas/alçapões/portões no freecam."

  [kbfc.config.collision.ignoreCustom]
  label = "Lista de Blocos Ignorados"
  tooltip = "Permite atravessar certos blocos no freecam."

[kbfc.config.collision.whitelist.ids]
label = "Ignorar IDs"
"tooltip[0]" = 'Use o ID do bloco, p. ex.: "grass_block".'
"tooltip[1]" = 'Se o espaço de nome estiver omisso, "minecraft:" será usado.'

[kbfc.config.collision.whitelist.patterns]
label = "Ignorar Expressões Regulares"
"tooltip[0]" = "Usa a sintaxe de Expressões Regulares."
"tooltip[1]" = 'Corresponde ao ID inteiro do bloco, p. ex.: "minecraft:grass_block".'

  [kbfc.config.collision.alwaysCheck]
  label = "Sempre Conferir Colisão Inicial"
  "tooltip[0]" = "Se a §7Perspectiva Inicial§r deve conferir pela"
  "tooltip[1]" = "colisão, mesmo se usar §7Ignorar Colisões§r."

[kbfc.config.visual]
label = "Visuais"
tooltip = "O visual do freecam."

  [kbfc.config.visual.perspective]
  label = "Perspectiva Inicial"
  tooltip = "A perspectiva inicial da câmera."
  FIRST_PERSON = "Primeira Pessoa"
  THIRD_PERSON = "Terceira Pessoa"
  THIRD_PERSON_MIRROR = "Espelhar"
  INSIDE = "Dentro"

  [kbfc.config.visual.showPlayer]
  label = "Exibir Jogador"
  tooltip = "Exibe o jogador em sua posição original."

  [kbfc.config.visual.showHand]
  label = "Exibir Mão"
  tooltip = "Se você pode ver sua mão no freecam."

  [kbfc.config.visual.fullBright]
  label = "Brilho Máximo"
  tooltip = "Aumenta o brilho no freecam."

  [kbfc.config.visual.showSubmersionFog]
  label = "Exibir Névoa de Fluidos"
  tooltip = "Se você pode ver névoa embaixo d'água, na lava ou na neve fofa."

  [kbfc.config.visual.outlinePlayer]
  label = "Contorno de Jogador"
  "tooltip[0]" = "Aplica um contorno em seu jogador ao ativar o Freecam."
  "tooltip[1]" = 'O contorno também pode ser alternado com o atalho "Alternar Contorno de Jogador".'

[kbfc.config.utility]
label = "Utilitários"
tooltip = "Melhorias no Freecam."

  [kbfc.config.utility.disableOnDamage]
  label = "Fechar ao Levar Dano"
  tooltip = "Fecha o freecam ao levar dano."

  [kbfc.config.utility.freezePlayer]
  label = "Congelar Jogador"
  "tooltip[0]" = "Impede o jogador de se mover enquanto o freecam estiver ativo."
  "tooltip[1]" = "§cAVISO: Usar em multijogador não é recomendado."

[kbfc.config.utility.interact.allow]
label = "Permitir Interações"
"tooltip[0]" = "Se você pode interagir com blocos/entidades no freecam."
"tooltip[1]" = "§cAVISO: Usar em multijogador não é recomendado."

[kbfc.config.utility.interact.mode]
label = "Modo de Interação"
tooltip = "A fonte das interações com blocos/entidades."
CAMERA = "Câmera"
PLAYER = "Jogador"

[kbfc.config.servers]
label = "Multijogador"
tooltip = "Opções relacionadas aos servidores multijogador."

  [kbfc.config.servers.mode]
  label = "Modo restrito"
  "tooltip[0]" = "Alterna o uso do freecam em certos servidores."
  "tooltip[1]" = "(usando ou a lista branca, ou a lista negra)."
  NONE = "Sem restrições"
  WHITELIST = "Lista branca"
  BLACKLIST = "Lista negra"

  [kbfc.config.servers.whitelist]
  label = "Lista branca:"

  [kbfc.config.servers.blacklist]
  label = "Lista negra:"

[kbfc.config.notification]
label = "Notificações"
tooltip = "Exibe ou oculta as notificações."

  [kbfc.config.notification.freecam]
  label = "Notificações do Freecam"
  tooltip = "Notifica você ao entrar/sair do freecam."

  [kbfc.config.notification.tripod]
  label = "Notificações do Tripé"
  tooltip = "Notifica você ao entrar/sair das câmeras com tripé."
