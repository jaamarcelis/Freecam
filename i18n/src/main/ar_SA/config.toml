[kbfc.config.gui]
title = "Freecam Options"

  [kbfc.config.gui.fallback]
  title = "Config GUI not available."

[kbfc.config.controls]
label = "Key Bindings"
tooltip = "Freecam key bindings."

[kbfc.config.movement]
label = "Movement Options"
tooltip = "How the camera moves."

  [kbfc.config.movement.flightMode]
  label = "Flight Mode"
  tooltip = "The type of flight used by freecam."
  DEFAULT = "Default"
  CREATIVE = "Creative"

  [kbfc.config.movement.speed]
  value = "Value: %01.2f"

    [kbfc.config.movement.speed.horizontal]
    label = "Horizontal Speed"
    tooltip = "The horizontal speed of freecam."

    [kbfc.config.movement.speed.vertical]
    label = "Vertical Speed"
    tooltip = "The vertical speed of freecam."

[kbfc.config.collision]
label = "Collision Options"
tooltip = "Which blocks you can travel through in freecam."

  [kbfc.config.collision.ignoreAll]
  label = "Ignore All Collision"
  "tooltip[0]" = "Allows travelling through all blocks in freecam."
  "tooltip[1]" = "§eOverrides above settings."

  [kbfc.config.collision.ignoreTransparent]
  label = "Ignore Transparent Blocks"
  tooltip = "Allows travelling through transparent blocks in freecam."

  [kbfc.config.collision.ignoreOpenable]
  label = "Ignore Openable Blocks"
  tooltip = "Allows travelling through doors/trapdoors/gates in freecam."

  [kbfc.config.collision.ignoreCustom]
  label = "Custom Ignore List"
  tooltip = "Allows travelling through specific blocks in freecam."

[kbfc.config.collision.whitelist.ids]
label = "Ignore IDs"
"tooltip[0]" = 'Use block id, e.g. "grass_block".'
"tooltip[1]" = 'If the namespace is omitted, "minecraft:" is assumed.'

[kbfc.config.collision.whitelist.patterns]
label = "Ignore Regular Expressions"
"tooltip[0]" = "Use Regular Expression syntax."
"tooltip[1]" = 'Matched against full block id, e.g. "minecraft:grass_block".'

  [kbfc.config.collision.alwaysCheck]
  label = "Always Check Initial Collision"
  "tooltip[0]" = "Whether §7Initial Perspective§r should check for"
  "tooltip[1]" = "collision, even when using §7Ignore All Collision§r."

[kbfc.config.visual]
label = "Visual Options"
tooltip = "The look of freecam."

  [kbfc.config.visual.perspective]
  label = "Initial Perspective"
  tooltip = "The initial perspective of the camera."
  FIRST_PERSON = "First Person"
  THIRD_PERSON = "Third Person"
  THIRD_PERSON_MIRROR = "Mirror"
  INSIDE = "Inside"

  [kbfc.config.visual.showPlayer]
  label = "Show Player"
  tooltip = "Shows your player in its original position."

  [kbfc.config.visual.showHand]
  label = "Show Hand"
  tooltip = "Whether you can see your hand in freecam."

  [kbfc.config.visual.fullBright]
  label = "Full Brightness"
  tooltip = "Increases brightness while in freecam."

  [kbfc.config.visual.showSubmersionFog]
  label = "Show Submersion Fog"
  tooltip = "Whether you see a fog overlay underwater, in lava, or powdered snow."

  [kbfc.config.visual.outlinePlayer]
  label = "Outline Player"
  "tooltip[0]" = "Apply an outline to your player when activating Freecam."
  "tooltip[1]" = 'The outline can also be controlled using the "Toggle Player Outline" keybind.'

[kbfc.config.utility]
label = "Utility Options"
tooltip = "Freecam enhancements."

  [kbfc.config.utility.disableOnDamage]
  label = "Disable on Damage"
  tooltip = "Disables freecam when damage is received."

  [kbfc.config.utility.freezePlayer]
  label = "Freeze Player"
  "tooltip[0]" = "Prevents player movement while freecam is active."
  "tooltip[1]" = "§cWARNING: Multiplayer usage not advised."

[kbfc.config.utility.interact.allow]
label = "Allow Interaction"
"tooltip[0]" = "Whether you can interact with blocks/entities in freecam."
"tooltip[1]" = "§cWARNING: Multiplayer usage not advised."

[kbfc.config.utility.interact.mode]
label = "Interaction Mode"
tooltip = "The source of block/entity interactions."
CAMERA = "Camera"
PLAYER = "Player"

[kbfc.config.servers]
label = "Multiplayer Options"
tooltip = "Options relating to multiplayer servers."

  [kbfc.config.servers.mode]
  label = "Restriction mode"
  "tooltip[0]" = "Allow or disallow use of freecam on certain servers."
  "tooltip[1]" = "(using either a whitelist or blacklist)."
  NONE = "No restriction"
  WHITELIST = "Whitelist"
  BLACKLIST = "Blacklist"

  [kbfc.config.servers.whitelist]
  label = "Whitelist:"

  [kbfc.config.servers.blacklist]
  label = "Blacklist:"

[kbfc.config.notification]
label = "Notification Options"
tooltip = "Show or hide notifications."

  [kbfc.config.notification.freecam]
  label = "Freecam Notifications"
  tooltip = "Notifies you when entering/exiting freecam."

  [kbfc.config.notification.tripod]
  label = "Tripod Notifications"
  tooltip = "Notifies you when entering/exiting tripod cameras."
