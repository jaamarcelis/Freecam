[kbfc.config.gui]
title = "Opciones de Freecam"

  [kbfc.config.gui.fallback]
  title = "La interfaz de configuración no está disponible."

[kbfc.config.controls]
label = "Teclas Asignadas"
tooltip = "Teclas de freecam."

[kbfc.config.movement]
label = "Opciones de Movimiento"
tooltip = "Cómo la cámara se mueve."

  [kbfc.config.movement.flightMode]
  label = "Modo Vuelo"
  tooltip = "El tipo de vuelo usado por freecam."
  DEFAULT = "Predeterminado"
  CREATIVE = "Creativo"

  [kbfc.config.movement.speed]
  value = "Valor: %01.2f"

    [kbfc.config.movement.speed.horizontal]
    label = "Velocidad Horizontal"
    tooltip = "La velocidad horizontal de la freecam."

    [kbfc.config.movement.speed.vertical]
    label = "Velocidad Vertical"
    tooltip = "La velocidad vertical de la freecam."

[kbfc.config.collision]
label = "Opciones de Colisión"
tooltip = "Cuales bloques puedes atravesar en freecam."

  [kbfc.config.collision.ignoreAll]
  label = "Ignorar Toda Colisión"
  "tooltip[0]" = "Permite atravesar todos los bloques en freecam."
  "tooltip[1]" = "§eAnula las opciones de arriba."

  [kbfc.config.collision.ignoreTransparent]
  label = "Ignorar Bloques Transparentes"
  tooltip = "Permite atravesar bloques transparentes en freecam."

  [kbfc.config.collision.ignoreOpenable]
  label = "Ignorar Bloques Abribles"
  tooltip = "Permite atravesar puertas/trampillas/vallas en freecam."

  [kbfc.config.collision.ignoreCustom]
  label = "Lista de Ignorados Personalizada"
  tooltip = "Permite atravesar bloques específicos en freecam."

[kbfc.config.collision.whitelist.ids]
label = "Ignorar IDs"
"tooltip[0]" = 'Usar id del bloque, p.ej. "grass_block".'
"tooltip[1]" = 'Si se omite el namespace, se asume "minecraft:".'

[kbfc.config.collision.whitelist.patterns]
label = "Ignorar Expresiones Regulares"
"tooltip[0]" = "Usar sintaxis de expresiones regulares."
"tooltip[1]" = 'Coincide con el id completo del bloque, ej. "minecraft:grass_block".'

  [kbfc.config.collision.alwaysCheck]
  label = "Siempre Verificar Colisión Inicial"
  "tooltip[0]" = "Si la §7Perspectiva Inicial§r debe revisar"
  "tooltip[1]" = "colisión, incluso usando §7Ignorar Toda Colisión§r."

[kbfc.config.visual]
label = "Opciones Visuales"
tooltip = "La vista de freecam."

  [kbfc.config.visual.perspective]
  label = "Perspectiva Inicial"
  tooltip = "La perspectiva inicial de la cámara."
  FIRST_PERSON = "Primera Persona"
  THIRD_PERSON = "Tercera Persona"
  THIRD_PERSON_MIRROR = "Espejo"
  INSIDE = "Dentro"

  [kbfc.config.visual.showPlayer]
  label = "Mostrar Jugador"
  tooltip = "Muestra tu personaje en su posición original."

  [kbfc.config.visual.showHand]
  label = "Mostrar Mano"
  tooltip = "Si puedes ver tu mano en freecam."

  [kbfc.config.visual.fullBright]
  label = "Brillo Máximo"
  tooltip = "Aumenta el brillo mientras se usa freecam."

  [kbfc.config.visual.showSubmersionFog]
  label = "Mostrar Borrosidad de Sumersión"
  tooltip = "Si ves borrosidad al estar bajo el agua, en lava o en nieve en polvo."

  [kbfc.config.visual.outlinePlayer]
  label = "Outline Player"
  "tooltip[0]" = "Apply an outline to your player when activating Freecam."
  "tooltip[1]" = 'The outline can also be controlled using the "Toggle Player Outline" keybind.'

[kbfc.config.utility]
label = "Opciones de Utilidad"
tooltip = "Mejoras de freecam."

  [kbfc.config.utility.disableOnDamage]
  label = "Desactivar con Daño"
  tooltip = "Desactiva freecam al recibir daño."

  [kbfc.config.utility.freezePlayer]
  label = "Congelar Jugador"
  "tooltip[0]" = "Previene movimiento del jugador mientras freecam está activo."
  "tooltip[1]" = "§cADVERTENCIA: No se aconseja usar en Multijugador."

[kbfc.config.utility.interact.allow]
label = "Permitir Interacción"
"tooltip[0]" = "Si puedes interactuar con bloques/entidades en freecam."
"tooltip[1]" = "§cADVERTENCIA: No se aconseja usar en Multijugador."

[kbfc.config.utility.interact.mode]
label = "Modo de Interacción"
tooltip = "La fuente de las interacciones con bloques/entidades."
CAMERA = "Cámara"
PLAYER = "Jugador"

[kbfc.config.servers]
label = "Opciones de Multijugador"
tooltip = "Opciones relacionadas con servidores multijugador."

  [kbfc.config.servers.mode]
  label = "Modo de restricción"
  "tooltip[0]" = "Permite o prohíbe usar freecam en ciertos servidores."
  "tooltip[1]" = "(usando una lista blanca o una lista negra)."
  NONE = "Sin restricción"
  WHITELIST = "Lista blanca"
  BLACKLIST = "Lista negra"

  [kbfc.config.servers.whitelist]
  label = "Lista blanca:"

  [kbfc.config.servers.blacklist]
  label = "Lista negra:"

[kbfc.config.notification]
label = "Opciones de Notificación"
tooltip = "Mostrar u ocultar notificaciones."

  [kbfc.config.notification.freecam]
  label = "Notificaciones de Freecam"
  tooltip = "Te notifica al entrar/salir de Freecam."

  [kbfc.config.notification.tripod]
  label = "Notificaciones de tripié"
  tooltip = "Te notifica al entrar/salir de las cámaras con tripié."
